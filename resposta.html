<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10080f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>Carregando resposta</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-loading" aria-labelledby="titulo-loading">
    <section class="card loading-card">
      <div class="shine" aria-hidden="true"></div>

      <div class="loading-ring" aria-hidden="true">
        <span>💍</span>
      </div>

      <p class="eyebrow">Amanda, sua resposta foi recebida</p>

      <h1 id="titulo-loading">Carregando sua resposta...</h1>

      <p class="subtitle">
        Segura a emoção. O Levi preparou uma surpresa para esse momento.
      </p>

      <div class="loading-bar" aria-hidden="true">
        <span></span>
      </div>

      <p class="loading-small">Abrindo sua resposta em instantes</p>

      <a class="btn yes full loading-open" href="casal.html">Abrir minha resposta agora</a>
    </section>
  </main>

  <script>
    window.setTimeout(() => {
      window.location.href = "casal.html";
    }, 3200);
  </script>
</body>
</html>
